global
    maxconn 10000

defaults
    mode tcp
    timeout connect 5s
    timeout client 30s
    timeout server 30s

frontend ferricstore
    bind *:6379
    default_backend ferricstore_nodes

backend ferricstore_nodes
    balance roundrobin
    server node1 ferricstore-1:6379 check
    server node2 ferricstore-2:6379 check
    server node3 ferricstore-3:6379 check
