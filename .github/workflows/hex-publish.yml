name: Publish to Hex.pm

on:
  push:
    tags: ["v*"]

env:
  MIX_ENV: dev

jobs:
  publish:
    name: Publish packages to Hex.pm
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: hex-publish-${{ hashFiles('mix.lock') }}

      - name: Install dependencies
        run: mix deps.get

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Wait for all precompiled NIF artifacts
        run: |
          # Both crates × 6 targets = 12 artifacts.
          # Mac targets also produce .sha256 files, so total is 16.
          # Conservatively, wait until we see at least 12 .tar.gz files
          # for each crate.
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          for i in $(seq 1 90); do
            ASSETS=$(gh release view "v${VERSION}" --repo "${GITHUB_REPOSITORY}" --json assets --jq '.assets[].name' 2>/dev/null || true)
            BITCASK_COUNT=$(echo "$ASSETS" | grep -c "ferricstore_bitcask-v${VERSION}-nif-2.16-.*\.tar\.gz$" || true)
            WAL_COUNT=$(echo "$ASSETS" | grep -c "ferricstore_wal_nif-v${VERSION}-nif-2.16-.*\.tar\.gz$" || true)
            echo "Attempt $i/90: bitcask=$BITCASK_COUNT/6, wal=$WAL_COUNT/6"
            if [ "$BITCASK_COUNT" -ge 6 ] && [ "$WAL_COUNT" -ge 6 ]; then
              echo "All 12 NIF artifacts present."
              break
            fi
            if [ "$i" = "90" ]; then
              echo "Timed out waiting for NIFs"
              exit 1
            fi
            sleep 10
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate NIF checksum files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Generate checksum files directly from the GitHub Release artifacts
          # using a pure shell script. This avoids loading the RustlerPrecompiled
          # macros, which would fail at compile time without an existing checksum.
          set -euo pipefail
          cd apps/ferricstore
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p /tmp/nif_artifacts
          gh release download "v${VERSION}" \
            --repo "${GITHUB_REPOSITORY}" \
            --dir /tmp/nif_artifacts \
            --pattern '*.tar.gz'

          generate_checksum_file() {
            local out_file="$1"
            shift
            {
              echo "%{"
              for pattern in "$@"; do
                for f in /tmp/nif_artifacts/${pattern}; do
                  [ -f "$f" ] || continue
                  local basename=$(basename "$f")
                  local sum=$(shasum -a 256 "$f" | cut -d' ' -f1)
                  echo "  \"${basename}\" => \"sha256:${sum}\","
                done
              done
              echo "}"
            } > "$out_file"
            echo "Generated $out_file:"
            cat "$out_file"
          }

          generate_checksum_file \
            "checksum-Elixir.Ferricstore.Bitcask.NIF.exs" \
            "ferricstore_bitcask-v${VERSION}-*.tar.gz" \
            "libferricstore_bitcask-v${VERSION}-*.tar.gz"

          generate_checksum_file \
            "checksum-ferricstore_wal_nif.exs" \
            "ferricstore_wal_nif-v${VERSION}-*.tar.gz" \
            "libferricstore_wal_nif-v${VERSION}-*.tar.gz"

      # Publish in dependency order: core first, then packages that depend on it
      - name: Publish ferricstore (core)
        run: |
          cd apps/ferricstore
          mix hex.publish --replace --yes
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}

      - name: Publish ferricstore_ecto
        run: |
          cd apps/ferricstore_ecto
          mix deps.get
          mix hex.publish package --replace --yes
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
          HEX_PUBLISH: "1"

      - name: Publish ferricstore_session
        run: |
          cd apps/ferricstore_session
          mix deps.get
          mix hex.publish package --replace --yes
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
          HEX_PUBLISH: "1"
