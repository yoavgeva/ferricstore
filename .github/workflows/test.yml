name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  MIX_ENV: test
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: "Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: "1.19"
            otp: "28"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Mix deps
        uses: actions/cache@v4
        with:
          path: deps
          key: mix-deps-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('mix.lock') }}
          restore-keys: mix-deps-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/ferricstore_bitcask/target
          key: cargo-${{ runner.os }}-${{ hashFiles('native/ferricstore_bitcask/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Check Rust formatting
        run: cargo fmt --manifest-path native/ferricstore_bitcask/Cargo.toml -- --check

      - name: Run Clippy
        run: cargo clippy --manifest-path native/ferricstore_bitcask/Cargo.toml --all-targets -- -D warnings

      - name: Run Rust tests
        run: cargo test --manifest-path native/ferricstore_bitcask/Cargo.toml

      - name: Build NIF (release)
        run: |
          cargo build --release --manifest-path native/ferricstore_bitcask/Cargo.toml
          mkdir -p priv/native
          cp native/ferricstore_bitcask/target/release/libferricstore_bitcask.so priv/native/ferricstore_bitcask.so

      - name: Compile
        run: mix compile

      - name: Run tests
        run: mix test --trace --timeout 30000

      - name: Run cluster tests (multi-node via :peer)
        run: |
          epmd -daemon
          elixir --sname ci_runner --cookie ferricstore_test -S mix test --include cluster --timeout 60000
        continue-on-error: true

      - name: Run Jepsen-style durability tests
        run: |
          elixir --sname ci_jepsen --cookie ferricstore_test -S mix test --include jepsen --timeout 120000
        continue-on-error: true

      - name: Run performance tests
        run: mix test --only perf --timeout 60000

      - name: Run large allocation tests
        run: mix test --only large_alloc --timeout 60000

      - name: Check io_uring availability
        id: uring
        run: |
          if cat /proc/sys/kernel/io_uring_disabled 2>/dev/null | grep -q "^0$"; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run io_uring + scheduler stress tests (Linux, io_uring available)
        if: steps.uring.outputs.available == 'true'
        run: mix test --only linux_io_uring
