name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  MIX_ENV: test
  RUSTFLAGS: "-D warnings"
  FERRICSTORE_BUILD_NIF: "1"

jobs:
  test:
    name: "Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }}"
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: "1.19"
            otp: "28"
            os: ubuntu-latest
          - elixir: "1.19"
            otp: "28"
            os: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Mix deps
        uses: actions/cache@v4
        with:
          path: deps
          key: mix-deps-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('mix.lock') }}
          restore-keys: mix-deps-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/ferricstore/native/ferricstore_bitcask/target
          key: cargo-${{ runner.os }}-${{ hashFiles('apps/ferricstore/native/ferricstore_bitcask/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Check Rust formatting
        run: cargo fmt --manifest-path apps/ferricstore/native/ferricstore_bitcask/Cargo.toml -- --check

      - name: Run Clippy
        run: cargo clippy --manifest-path apps/ferricstore/native/ferricstore_bitcask/Cargo.toml --all-targets -- -D warnings

      - name: Run Rust tests
        run: cargo test --manifest-path apps/ferricstore/native/ferricstore_bitcask/Cargo.toml

      - name: Build NIF (release)
        run: |
          cargo build --release --manifest-path apps/ferricstore/native/ferricstore_bitcask/Cargo.toml
          mkdir -p apps/ferricstore/priv/native
          if [ -f apps/ferricstore/native/ferricstore_bitcask/target/release/libferricstore_bitcask.dylib ]; then
            SRC=apps/ferricstore/native/ferricstore_bitcask/target/release/libferricstore_bitcask.dylib
          else
            SRC=apps/ferricstore/native/ferricstore_bitcask/target/release/libferricstore_bitcask.so
          fi
          cp "$SRC" apps/ferricstore/priv/native/libferricstore_bitcask.so
          cp "$SRC" apps/ferricstore/priv/native/ferricstore_bitcask.so

      - name: Compile
        run: mix compile

      - name: Run tests (excluding shard-kill)
        run: mix test --trace --timeout 30000

      - name: Run shard-kill durability tests (isolated)
        run: mix test --only shard_kill --timeout 60000

      - name: Run cluster tests (multi-node via :peer)
        if: always()
        run: |
          epmd -daemon
          elixir --sname ci_runner --cookie ferricstore_test -S mix test --include cluster --timeout 60000
        continue-on-error: true

      - name: Run Jepsen-style durability tests
        if: always()
        run: |
          elixir --sname ci_jepsen --cookie ferricstore_test -S mix test --include jepsen --timeout 120000
        continue-on-error: true

      - name: Run performance tests
        run: mix test --only perf --timeout 60000

      - name: Run large allocation tests
        run: mix test --only large_alloc --timeout 60000

      - name: Check io_uring availability (Linux only)
        if: runner.os == 'Linux'
        id: uring
        run: |
          if cat /proc/sys/kernel/io_uring_disabled 2>/dev/null | grep -q "^0$"; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run io_uring + scheduler stress tests (Linux, io_uring available)
        if: runner.os == 'Linux' && steps.uring.outputs.available == 'true'
        run: mix test --only linux_io_uring

      - name: Upload test audit logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-audit-${{ matrix.os }}-elixir${{ matrix.elixir }}
          path: /tmp/ferricstore_test_audit/
          retention-days: 7
