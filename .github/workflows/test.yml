name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  MIX_ENV: test
  RUSTFLAGS: "-D warnings"
  FERRICSTORE_BUILD_NIF: "1"

jobs:
  # ===========================================================================
  # Build (Ubuntu)
  # ===========================================================================
  build-ubuntu:
    name: "Build (ubuntu)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Mix deps
        uses: actions/cache@v4
        with:
          path: deps
          key: mix-deps-Linux-1.19-28-${{ hashFiles('mix.lock') }}
          restore-keys: mix-deps-Linux-1.19-28-

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/ferricstore/native/ferricstore_bitcask/target
          key: cargo-Linux-${{ hashFiles('apps/ferricstore/native/ferricstore_bitcask/Cargo.lock') }}
          restore-keys: cargo-Linux-

      - name: Install dependencies
        run: mix deps.get

      - name: Check Rust formatting
        run: cargo fmt --manifest-path apps/ferricstore/native/ferricstore_bitcask/Cargo.toml -- --check

      - name: Run Clippy
        run: cargo clippy --manifest-path apps/ferricstore/native/ferricstore_bitcask/Cargo.toml --all-targets -- -D warnings

      - name: Run Rust tests
        run: cargo test --manifest-path apps/ferricstore/native/ferricstore_bitcask/Cargo.toml

      - name: Build NIF (release)
        run: |
          cargo build --release --manifest-path apps/ferricstore/native/ferricstore_bitcask/Cargo.toml
          mkdir -p apps/ferricstore/priv/native
          cp apps/ferricstore/native/ferricstore_bitcask/target/release/libferricstore_bitcask.so apps/ferricstore/priv/native/libferricstore_bitcask.so
          cp apps/ferricstore/native/ferricstore_bitcask/target/release/libferricstore_bitcask.so apps/ferricstore/priv/native/ferricstore_bitcask.so

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Credo
        run: mix credo --min-priority high

      - name: Cache build artifacts
        uses: actions/cache/save@v4
        with:
          path: |
            _build
            deps
            apps/ferricstore/priv/native
          key: build-Linux-${{ github.sha }}

  # ===========================================================================
  # Build (macOS)
  # ===========================================================================
  build-macos:
    name: "Build (macos)"
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Mix deps
        uses: actions/cache@v4
        with:
          path: deps
          key: mix-deps-macOS-1.19-28-${{ hashFiles('mix.lock') }}
          restore-keys: mix-deps-macOS-1.19-28-

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/ferricstore/native/ferricstore_bitcask/target
          key: cargo-macOS-${{ hashFiles('apps/ferricstore/native/ferricstore_bitcask/Cargo.lock') }}
          restore-keys: cargo-macOS-

      - name: Install dependencies
        run: mix deps.get

      - name: Check Rust formatting
        run: cargo fmt --manifest-path apps/ferricstore/native/ferricstore_bitcask/Cargo.toml -- --check

      - name: Run Clippy
        run: cargo clippy --manifest-path apps/ferricstore/native/ferricstore_bitcask/Cargo.toml --all-targets -- -D warnings

      - name: Run Rust tests
        run: cargo test --manifest-path apps/ferricstore/native/ferricstore_bitcask/Cargo.toml

      - name: Build NIF (release)
        run: |
          cargo build --release --manifest-path apps/ferricstore/native/ferricstore_bitcask/Cargo.toml
          mkdir -p apps/ferricstore/priv/native
          cp apps/ferricstore/native/ferricstore_bitcask/target/release/libferricstore_bitcask.dylib apps/ferricstore/priv/native/libferricstore_bitcask.so
          cp apps/ferricstore/native/ferricstore_bitcask/target/release/libferricstore_bitcask.dylib apps/ferricstore/priv/native/ferricstore_bitcask.so

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Credo
        run: mix credo --min-priority high

      - name: Cache build artifacts
        uses: actions/cache/save@v4
        with:
          path: |
            _build
            deps
            apps/ferricstore/priv/native
          key: build-macOS-${{ github.sha }}

  # ===========================================================================
  # Core tests (parallel per OS, independent)
  # ===========================================================================
  test-core-ubuntu:
    name: "Core tests (ubuntu)"
    needs: build-ubuntu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache/restore@v4
        with:
          path: |
            _build
            deps
            apps/ferricstore/priv/native
          key: build-Linux-${{ github.sha }}
      - name: Run ferricstore tests
        run: mix test apps/ferricstore/test --timeout 30000
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-core-ubuntu
          path: test-results/
          retention-days: 14

  test-core-macos:
    name: "Core tests (macos)"
    needs: build-macos
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache/restore@v4
        with:
          path: |
            _build
            deps
            apps/ferricstore/priv/native
          key: build-macOS-${{ github.sha }}
      - name: Run ferricstore tests
        run: mix test apps/ferricstore/test --timeout 30000
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-core-macos
          path: test-results/
          retention-days: 14

  # ===========================================================================
  # Server tests (parallel per OS, independent)
  # ===========================================================================
  test-server-ubuntu:
    name: "Server tests (ubuntu)"
    needs: build-ubuntu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache/restore@v4
        with:
          path: |
            _build
            deps
            apps/ferricstore/priv/native
          key: build-Linux-${{ github.sha }}
      - name: Run ferricstore_server tests
        run: mix test apps/ferricstore_server/test --timeout 30000
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-server-ubuntu
          path: test-results/
          retention-days: 14

  test-server-macos:
    name: "Server tests (macos)"
    needs: build-macos
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache/restore@v4
        with:
          path: |
            _build
            deps
            apps/ferricstore/priv/native
          key: build-macOS-${{ github.sha }}
      - name: Run ferricstore_server tests
        run: mix test apps/ferricstore_server/test --timeout 30000
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-server-macos
          path: test-results/
          retention-days: 14

  # ===========================================================================
  # Durability tests (ubuntu only — shard-kill, jepsen, large alloc)
  # ===========================================================================
  test-durability:
    name: "Durability tests"
    needs: build-ubuntu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache/restore@v4
        with:
          path: |
            _build
            deps
            apps/ferricstore/priv/native
          key: build-Linux-${{ github.sha }}

      - name: Shard-kill durability tests
        run: mix test --only shard_kill --timeout 120000
        continue-on-error: true

      - name: Jepsen-style durability tests
        run: |
          epmd -daemon
          elixir --sname ci_jepsen --cookie ferricstore_test -S mix test --include jepsen --timeout 120000
        continue-on-error: true

      - name: Large allocation tests
        run: mix test apps/ferricstore/test --only large_alloc --timeout 120000
        continue-on-error: true

      - name: Check io_uring availability
        id: uring
        run: |
          if cat /proc/sys/kernel/io_uring_disabled 2>/dev/null | grep -q "^0$"; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run io_uring tests
        if: steps.uring.outputs.available == 'true'
        run: mix test apps/ferricstore/test --only linux_io_uring
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-durability
          path: test-results/
          retention-days: 14

  # ===========================================================================
  # Cluster tests (ubuntu only — multi-node via :peer)
  # ===========================================================================
  test-cluster:
    name: "Cluster tests"
    needs: build-ubuntu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache/restore@v4
        with:
          path: |
            _build
            deps
            apps/ferricstore/priv/native
          key: build-Linux-${{ github.sha }}

      - name: Cluster tests
        run: |
          epmd -daemon
          elixir --sname ci_cluster --cookie ferricstore_test -S mix test --include cluster --timeout 60000
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-cluster
          path: test-results/
          retention-days: 14
