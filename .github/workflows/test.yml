name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  MIX_ENV: test
  RUSTFLAGS: "-D warnings"
  FERRICSTORE_BUILD_NIF: "1"

jobs:
  # ===========================================================================
  # Build: compile + NIF + cache — shared by all test jobs
  # ===========================================================================
  build:
    name: "Build (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            elixir: "1.19"
            otp: "28"
          - os: macos-latest
            elixir: "1.19"
            otp: "28"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Mix deps
        uses: actions/cache@v4
        with:
          path: deps
          key: mix-deps-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('mix.lock') }}
          restore-keys: mix-deps-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/ferricstore/native/ferricstore_bitcask/target
          key: cargo-${{ runner.os }}-${{ hashFiles('apps/ferricstore/native/ferricstore_bitcask/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Check Rust formatting
        run: cargo fmt --manifest-path apps/ferricstore/native/ferricstore_bitcask/Cargo.toml -- --check

      - name: Run Clippy
        run: cargo clippy --manifest-path apps/ferricstore/native/ferricstore_bitcask/Cargo.toml --all-targets -- -D warnings

      - name: Run Rust tests
        run: cargo test --manifest-path apps/ferricstore/native/ferricstore_bitcask/Cargo.toml

      - name: Build NIF (release)
        run: |
          cargo build --release --manifest-path apps/ferricstore/native/ferricstore_bitcask/Cargo.toml
          mkdir -p apps/ferricstore/priv/native
          if [ -f apps/ferricstore/native/ferricstore_bitcask/target/release/libferricstore_bitcask.dylib ]; then
            SRC=apps/ferricstore/native/ferricstore_bitcask/target/release/libferricstore_bitcask.dylib
          else
            SRC=apps/ferricstore/native/ferricstore_bitcask/target/release/libferricstore_bitcask.so
          fi
          cp "$SRC" apps/ferricstore/priv/native/libferricstore_bitcask.so
          cp "$SRC" apps/ferricstore/priv/native/ferricstore_bitcask.so

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Credo
        run: mix credo --min-priority high

      # Cache the entire _build and priv/native for downstream jobs
      - name: Cache build artifacts
        uses: actions/cache/save@v4
        with:
          path: |
            _build
            deps
            apps/ferricstore/priv/native
          key: build-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-${{ github.sha }}

  # ===========================================================================
  # Core tests: ferricstore app
  # ===========================================================================
  test-core:
    name: "Core tests (${{ matrix.os }})"
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            elixir: "1.19"
            otp: "28"
          - os: macos-latest
            elixir: "1.19"
            otp: "28"

    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}
      - uses: dtolnay/rust-toolchain@stable

      - name: Restore build artifacts
        uses: actions/cache/restore@v4
        with:
          path: |
            _build
            deps
            apps/ferricstore/priv/native
          key: build-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-${{ github.sha }}

      - name: Run ferricstore tests
        run: mix test apps/ferricstore/test --timeout 30000

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-core-${{ matrix.os }}
          path: test-results/
          retention-days: 14

  # ===========================================================================
  # Server tests: ferricstore_server app
  # ===========================================================================
  test-server:
    name: "Server tests (${{ matrix.os }})"
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            elixir: "1.19"
            otp: "28"
          - os: macos-latest
            elixir: "1.19"
            otp: "28"

    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}
      - uses: dtolnay/rust-toolchain@stable

      - name: Restore build artifacts
        uses: actions/cache/restore@v4
        with:
          path: |
            _build
            deps
            apps/ferricstore/priv/native
          key: build-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-${{ github.sha }}

      - name: Run ferricstore_server tests
        run: mix test apps/ferricstore_server/test --timeout 30000

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-server-${{ matrix.os }}
          path: test-results/
          retention-days: 14

  # ===========================================================================
  # Durability tests: shard-kill, jepsen, large alloc (isolated)
  # ===========================================================================
  test-durability:
    name: "Durability tests (${{ matrix.os }})"
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            elixir: "1.19"
            otp: "28"
          - os: macos-latest
            elixir: "1.19"
            otp: "28"

    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}
      - uses: dtolnay/rust-toolchain@stable

      - name: Restore build artifacts
        uses: actions/cache/restore@v4
        with:
          path: |
            _build
            deps
            apps/ferricstore/priv/native
          key: build-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-${{ github.sha }}

      - name: Shard-kill durability tests
        run: mix test --only shard_kill --timeout 120000
        continue-on-error: true

      - name: Jepsen-style durability tests
        run: |
          epmd -daemon
          elixir --sname ci_jepsen --cookie ferricstore_test -S mix test --include jepsen --timeout 120000
        continue-on-error: true

      - name: Large allocation tests
        run: mix test apps/ferricstore/test --only large_alloc --timeout 120000
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-durability-${{ matrix.os }}
          path: test-results/
          retention-days: 14

  # ===========================================================================
  # Cluster tests: multi-node via :peer
  # ===========================================================================
  test-cluster:
    name: "Cluster tests (${{ matrix.os }})"
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            elixir: "1.19"
            otp: "28"
          - os: macos-latest
            elixir: "1.19"
            otp: "28"

    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}
      - uses: dtolnay/rust-toolchain@stable

      - name: Restore build artifacts
        uses: actions/cache/restore@v4
        with:
          path: |
            _build
            deps
            apps/ferricstore/priv/native
          key: build-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-${{ github.sha }}

      - name: Cluster tests
        run: |
          epmd -daemon
          elixir --sname ci_cluster --cookie ferricstore_test -S mix test --include cluster --timeout 60000
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-cluster-${{ matrix.os }}
          path: test-results/
          retention-days: 14
