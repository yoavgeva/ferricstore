name: Benchmark

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      warmup:
        description: "Benchee warmup seconds"
        default: "3"
      time:
        description: "Benchee run seconds per scenario"
        default: "10"

env:
  MIX_ENV: bench

jobs:
  bench:
    name: "TCP + Group-Commit Throughput"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: native/ferricstore_bitcask/target
          key: rust-bench-${{ runner.os }}-${{ hashFiles('native/ferricstore_bitcask/Cargo.lock') }}
          restore-keys: rust-bench-${{ runner.os }}-

      - name: Cache Mix deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-bench-${{ runner.os }}-1.19-28-${{ hashFiles('mix.lock') }}
          restore-keys: mix-bench-${{ runner.os }}-1.19-28-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile (bench env)
        run: mix compile

      - name: Show system info
        run: |
          echo "=== CPU ===" && lscpu | grep -E "Model name|Socket|Core|Thread|MHz"
          echo "=== Memory ===" && free -h
          echo "=== Kernel ===" && uname -r
          echo "=== io_uring ===" && cat /proc/sys/kernel/io_uring_disabled 2>/dev/null && echo "(0 = enabled)" || echo "not available"
          echo "=== Scheduler threads ===" && nproc

      - name: Create bench output dir
        run: mkdir -p bench/output

      - name: Run TCP benchmark
        env:
          BENCH_WARMUP: ${{ github.event.inputs.warmup || '3' }}
          BENCH_TIME: ${{ github.event.inputs.time || '10' }}
        run: |
          echo "::group::TCP Benchmark Output"
          mix run bench/tcp_bench.exs 2>&1 | tee bench/output/tcp_results.txt
          echo "::endgroup::"

      - name: Run store benchmark
        run: |
          echo "::group::Store Benchmark Output"
          mix run bench/store_bench.exs 2>&1 | tee bench/output/store_results.txt
          echo "::endgroup::"

      - name: Run commands benchmark
        run: |
          echo "::group::Commands Benchmark Output"
          mix run bench/commands_bench.exs 2>&1 | tee bench/output/commands_results.txt
          echo "::endgroup::"

      - name: Print summary
        run: |
          echo "## Benchmark Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### System" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          lscpu | grep -E "Model name|Core\(s\) per socket|Thread" >> "$GITHUB_STEP_SUMMARY"
          free -h | head -2 >> "$GITHUB_STEP_SUMMARY"
          uname -r >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### TCP / Group-Commit Results" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat bench/output/tcp_results.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Store Results" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat bench/output/store_results.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Commands Results" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat bench/output/commands_results.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: bench/output/
          retention-days: 90
